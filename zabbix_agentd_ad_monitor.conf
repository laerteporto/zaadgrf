# Salvar em: C:\Program Files\Zabbix Agent\zabbix_agentd.conf.d\ad_monitor.conf
# (ou incluir via Include= no zabbix_agentd.conf)
#
# A coleta pesada (ad_monitor.ps1) roda via Task Scheduler a cada 5 min,
# gravando o resultado em C:\Scripts\ad_monitor_output.json (ver ad_monitor_write.ps1).
# O UserParameter abaixo so LE esse arquivo ja pronto - resposta instantanea,
# sem risco de timeout mesmo em ambientes AD maiores.

UserParameter=ad.monitor.data,cmd /c type C:\Scripts\ad_monitor_output.json

# Teste manual no host:
#   zabbix_agentd.exe -t ad.monitor.data
#
# Se aparecer vazio/erro "cannot find the file", confirme que a Scheduled
# Task "AD Monitor Collector" ja rodou pelo menos uma vez.
